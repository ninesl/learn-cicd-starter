name: Deploy

on:
  push:
    branches: [main]

job:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    jobs:
    - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build
        run: sh scripts/buildprod.sh
