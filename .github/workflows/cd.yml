name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    # This part
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: goose dependency
        run: go install github.com/pressly/goose/v3/cmd/goose@latest


      - name: Build
        run: sh scripts/buildprod.sh

      - name: migration
        run: sh scripts/migrateup.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: 'Deploy to GCR'
        run: 'gcloud builds submit --tag us-central1-docker.pkg.dev/notely-501016/notely-ar-repo/powernines/notely:latest .'

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-501016/notely-ar-repo/powernines/notely:latest --region us-central1 --allow-unauthenticated --project notely-501016 --max-instances=4
