jobs:
  job_id:
    steps:
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v3'

    - name: 'Use gcloud CLI'
      run: 'gcloud info'

    - name: 'Deploy to GCR'
      run: 'gcloud builds submit --tag us-central1-docker.pkg.dev/notely-501016/notely-ar-repo/powernines/notely:latest .'
